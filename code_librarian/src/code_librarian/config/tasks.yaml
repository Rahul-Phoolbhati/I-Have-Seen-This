generate_patterns_task:
  description: >
    Review the technical fix provided by the previous task. 
    1. Create 5 varied search queries based ONLY on this fix.
    2. Generate technical tags for a database.
    3. Write a one-sentence summary.
  expected_output: >
    A JSON object with keys: "search_queries", "tags", "summary".
  # CRITICAL: Do NOT add {chat_history} here. 
  # This task now only receives the small "Golden Fix" string.
  agent: pattern_expert