distillation_task:
  description: >
    Analyze this conversation: {chat_history}. 
    The user is working in the project directory: {project_path}.
    Find the final working solution and ignore the noise.
  expected_output: >
    A concise Markdown note with:
    ## Issue: [Brief description]
    ## Fix: [The working code/command]
    ## Context: [The project path or tech stack]
  agent: distiller

